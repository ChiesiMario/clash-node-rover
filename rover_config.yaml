# Clash Node Rover 設定檔

# Clash 外部控制 API 的網址，通常為 http://127.0.0.1:9090
api_url: "http://127.0.0.1:9090"

# Clash API 的密碼 (secret)，如果沒有設定請留空
api_secret: ""

# 背景檢查與測速的間隔時間 (例如 60s, 1m, 5m)
check_interval: 3m

# 要被 Rover 控制與切換節點的 Clash 代理群組名稱 (例如 PROXY 或 🤖 Node Rover)
target_groups:
  - "🤖 Node Rover (Main)"
  - "🤖 Node Rover (Cheap)"
  - "🇸🇬 新加坡節點"

# 專屬的無感測速群組 (Optional，留空則自動借用上述的 target_groups)。
# 如果設定此群組，Rover 測速時將不再借用你正在上網的群組，達成 100% 無感背景測速。
# (強烈建議：需配合 Clash 設定檔開啟獨立 Port 並將 clash_proxy_url 改為該 Port)
dedicated_test_group: "⚡️ Node Rover (SpeedTest)"

# 用來進行 Ping 測試的目標網址列表，會隨機抽取一個進行測試
test_urls:
  - "https://www.google.com"
  - "https://github.com"
  - "https://cloudflare.com"

# Ping 測試的超時時間
test_timeout: 3s

# 節點切換容忍度 (毫秒)。當新節點的綜合分數(Ping+Jitter)比目前節點快超過此數值時，才會進行切換，避免頻繁切換
tolerance_ms: 10

# 資料庫自動瘦身機制 (超過此天數的陳舊日誌將被自動刪除並壓縮資料庫體積)
cleanup_days: 7

# 最大併發測速數量 (數字越大測速越快，但可能短暫佔用系統資源)
max_concurrent: 10

# Web 儀表板的監聽埠
web_port: 9091

# Clash 的 HTTP 代理網址 (用於無頭瀏覽器測試)
clash_proxy_url: "http://127.0.0.1:7891"

# 發生連線錯誤時的退避冷卻循環次數。失敗越多次，冷卻越久，最高不超過此數值
max_backoff_cycles: 5

# 是否啟用無頭瀏覽器網頁測試 (實際開啟網頁測試連通性)
enable_browser_test: true

# 無頭瀏覽器測試的目標網址清單 (預設為 Google 與 YouTube)
browser_test_urls:
  - "https://www.youtube.com"
  - "https://github.com/ChiesiMario/clash-node-rover"

# 原生桌面通知設定
notifications:
  enable: true
  notify_on_better_node: false

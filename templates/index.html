    <style>
        :root {
            /* Material Design 3 Dark Theme (Tonal Palette based on Blue) */
            --md-sys-color-primary: #a8c7fa;
            --md-sys-color-on-primary: #062e6f;
            --md-sys-color-primary-container: #0842a0;
            --md-sys-color-on-primary-container: #d3e3fd;
            
            --md-sys-color-secondary: #c2c7cf;
            --md-sys-color-on-secondary: #2b313a;
            --md-sys-color-secondary-container: #414751;
            --md-sys-color-on-secondary-container: #dee3eb;

            --md-sys-color-error: #ffb4ab;
            --md-sys-color-error-container: #93000a;
            --md-sys-color-on-error: #690005;
            --md-sys-color-on-error-container: #ffdad6;

            --md-sys-color-success: #6dd58c;
            --md-sys-color-success-container: #00521c;
            --md-sys-color-on-success-container: #8bf2a6;

            --md-sys-color-warning: #eaddff;
            --md-sys-color-warning-container: #5b467a;
            --md-sys-color-on-warning-container: #f5eeff;
            
            --md-sys-color-background: #111318;
            --md-sys-color-on-background: #e2e2e9;
            
            --md-sys-color-surface: #111318;
            --md-sys-color-on-surface: #e2e2e9;
            --md-sys-color-surface-variant: #44474e;
            --md-sys-color-on-surface-variant: #c4c6d0;
            
            --md-sys-color-surface-container-lowest: #0c0e13;
            --md-sys-color-surface-container-low: #191c20;
            --md-sys-color-surface-container: #1d2024;
            --md-sys-color-surface-container-high: #282a2f;
            --md-sys-color-surface-container-highest: #33353a;

            --md-sys-color-outline: #8e9099;
            --md-sys-color-outline-variant: #44474e;
            
            --md-sys-color-disabled-bg: rgba(226, 226, 233, 0.12);
            --md-sys-color-disabled-text: rgba(226, 226, 233, 0.38);
        }

        :root.light-theme {
            --md-sys-color-primary: #0842a0;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d3e3fd;
            --md-sys-color-on-primary-container: #001c3b;
            
            --md-sys-color-secondary: #535f70;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #d7e3f8;
            --md-sys-color-on-secondary-container: #101c2b;

            --md-sys-color-error: #ba1a1a;
            --md-sys-color-error-container: #ffdad6;
            --md-sys-color-on-error: #ffffff;
            --md-sys-color-on-error-container: #410002;

            --md-sys-color-success: #146c2e;
            --md-sys-color-success-container: #a0f9b9;
            --md-sys-color-on-success-container: #002106;

            --md-sys-color-warning: #6d5e8f;
            --md-sys-color-warning-container: #f5eeff;
            --md-sys-color-on-warning-container: #271a47;
            
            --md-sys-color-background: #fdfbff;
            --md-sys-color-on-background: #1a1c1e;
            
            --md-sys-color-surface: #fdfbff;
            --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-surface-variant: #dfe2eb;
            --md-sys-color-on-surface-variant: #44474e;
            
            --md-sys-color-surface-container-lowest: #ffffff;
            --md-sys-color-surface-container-low: #f4f3f7;
            --md-sys-color-surface-container: #eeedf1;
            --md-sys-color-surface-container-high: #e8e7eb;
            --md-sys-color-surface-container-highest: #e2e2e5;

            --md-sys-color-outline: #74777f;
            --md-sys-color-outline-variant: #c4c6d0;
            
            --md-sys-color-disabled-bg: rgba(26, 28, 30, 0.12);
            --md-sys-color-disabled-text: rgba(26, 28, 30, 0.38);
        }

        body {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined {
            vertical-align: middle;
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Top App Bar */
        .top-app-bar {
            background-color: var(--md-sys-color-surface-container);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-title {
            font-size: 22px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-title-icon {
            color: var(--md-sys-color-primary);
        }

        /* Buttons */
        .btn {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            padding: 10px 24px;
            border-radius: 20px; /* Fully rounded Pill */
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            box-shadow: 0 1px 3px 1px rgba(0,0,0,0.15), 0 1px 2px 0 rgba(0,0,0,0.3);
            background-image: linear-gradient(color-mix(in srgb, currentColor 8%, transparent), color-mix(in srgb, currentColor 8%, transparent));
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            justify-content: center;
        }

        .icon-btn:hover {
            box-shadow: none; /* MD3 standard: Icon buttons do not elevate */
        }

        .btn:active {
            background-image: linear-gradient(color-mix(in srgb, currentColor 12%, transparent), color-mix(in srgb, currentColor 12%, transparent));
        }

        .btn.secondary {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
        }

        .btn.secondary:hover {
            background-image: linear-gradient(color-mix(in srgb, currentColor 8%, transparent), color-mix(in srgb, currentColor 8%, transparent));
        }

        .btn:disabled {
            background-color: var(--md-sys-color-disabled-bg);
            color: var(--md-sys-color-disabled-text);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Spin Animation for Material Icon */
        .spin {
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Segmented Button (Tabs) */
        .segmented-button {
            display: inline-flex;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .seg-btn {
            background: transparent;
            color: var(--md-sys-color-on-surface);
            border: none;
            padding: 10px 24px;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            border-right: 1px solid var(--md-sys-color-outline);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .seg-btn:last-child {
            border-right: none;
        }

        .seg-btn:hover {
            background-color: color-mix(in srgb, currentColor 8%, transparent);
        }

        .seg-btn.active {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Elevated Card */
        .card {
            background-color: var(--md-sys-color-surface-container-low);
            border-radius: 16px; /* MD3 Large Shape */
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15); /* MD3 Elevation 1 */
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 400;
            margin: 0 0 16px 0;
            color: var(--md-sys-color-on-surface);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Grid */
        .grid-groups {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .group-card {
            background-color: var(--md-sys-color-surface-container-low);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .group-header {
            font-size: 16px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
        }

        .group-now {
            font-size: 24px;
            font-weight: 400;
            color: var(--md-sys-color-primary);
        }

        /* Table */
        .table-container {
            border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: 16px;
            overflow: hidden;
            background-color: var(--md-sys-color-surface-container-low);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-on-surface-variant);
            font-size: 14px;
            font-weight: 500;
            padding: 16px;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            font-size: 14px;
            color: var(--md-sys-color-on-surface);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .node-row {
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.2, 0, 0, 1), background-color 0.2s;
            position: relative;
        }

        .node-row:hover {
            background-color: var(--md-sys-color-surface-container-high);
        }

        .node-row.expanded-row {
            background-color: var(--md-sys-color-surface-container-highest);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            gap: 4px;
        }

        .badge.primary { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
        .badge.success { background-color: var(--md-sys-color-success-container); color: var(--md-sys-color-on-success-container); }
        .badge.error { background-color: var(--md-sys-color-error-container); color: var(--md-sys-color-on-error-container); }
        .badge.warning { background-color: var(--md-sys-color-warning-container); color: var(--md-sys-color-on-warning-container); }

        .score-box {
            font-size: 16px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
            padding: 4px 12px;
            border-radius: 12px;
            background-color: var(--md-sys-color-surface-container-highest);
            display: inline-block;
            transition: background-color 0.3s;
        }

        /* Flash Effects */
        .flash-green { animation: flashGreen 1s ease-out; }
        .flash-red { animation: flashRed 1s ease-out; }
        
        @keyframes flashGreen {
            0% { background-color: var(--md-sys-color-success); color: #000; }
            100% { background-color: var(--md-sys-color-surface-container-highest); }
        }
        @keyframes flashRed {
            0% { background-color: var(--md-sys-color-error); color: #000; }
            100% { background-color: var(--md-sys-color-surface-container-highest); }
        }

        /* Chart Area */
        .chart-row {
            background-color: var(--md-sys-color-surface-container-lowest);
        }
        .chart-container {
            height: 250px;
            width: 100%;
        }

        /* Logs Console */
        .console {
            background-color: #000;
            color: #e2e2e9;
            font-family: 'Roboto Mono', monospace;
            padding: 16px;
            border-radius: 16px;
            height: 500px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-line {
            display: flex;
            margin-bottom: 4px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from{transform: translateX(-10px); opacity:0;} to{transform: translateX(0); opacity:1;} }

        .log-time { color: var(--md-sys-color-outline); margin-right: 12px; }
        .log-badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 12px; font-weight: bold; }
        .log-msg { word-break: break-all; }

        .log-info .log-badge { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
        .log-success .log-badge { background: var(--md-sys-color-success-container); color: var(--md-sys-color-on-success-container); }
        .log-warning .log-badge { background: var(--md-sys-color-warning-container); color: var(--md-sys-color-on-warning-container); }
        .log-error .log-badge { background: var(--md-sys-color-error-container); color: var(--md-sys-color-on-error-container); }
        
        .log-info .log-msg { color: #e2e2e9; }
        .log-success .log-msg { color: #6dd58c; }
        .log-warning .log-msg { color: #eaddff; }
        .log-error .log-msg { color: #ffb4ab; }
    </style>
</head>
<body>
    <div class="top-app-bar">
        <div class="app-title">
            <img id="app-logo-img" src="" alt="Logo" style="width: 32px; height: 32px; border-radius: 8px;">
            <div class="logo" style="margin-bottom: 0;">Clash Node Rover</div>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <button class="btn secondary icon-btn" onclick="toggleTheme()" title="Toggle Theme">
                <span id="themeIcon" class="material-symbols-outlined">light_mode</span>
            </button>
            <button id="pauseBtn" class="btn secondary" onclick="togglePause()">
                <span id="pauseIcon" class="material-symbols-outlined">pause</span>
                <span id="pauseText">Pause Brain</span>
            </button>
            <button id="triggerBtn" class="btn" onclick="triggerTest()">
                <span id="triggerIcon" class="material-symbols-outlined">rocket_launch</span>
                <span id="triggerText">Run Test</span>
            </button>
        </div>
    </div>

    <div class="container">
        <div class="segmented-button">
            <button id="btn-dashboard" class="seg-btn active" onclick="switchTab('dashboard')">
                <span class="material-symbols-outlined">dashboard</span> 儀表板
            </button>
            <button id="btn-logs" class="seg-btn" onclick="switchTab('logs')">
                <span class="material-symbols-outlined">terminal</span> 系統日誌
            </button>
        </div>

        <div id="tab-dashboard" class="tab-content active">
            <div class="grid-groups" id="groupsGrid">
                <!-- Groups injected here -->
            </div>

            <div class="card">
                <h2 class="card-title"><span class="material-symbols-outlined">leaderboard</span> 節點排行榜 (EMA)</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>節點名稱</th>
                                <th>動態分數</th>
                                <th>Ping 成功率</th>
                                <th>網頁體驗</th>
                                <th>網頁載入</th>
                                <th>上次測試</th>
                                <th>上次面試</th>
                            </tr>
                        </thead>
                        <tbody id="tbody">
                            <tr><td colspan="8" style="text-align:center; padding: 40px;">Initializing Data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-logs" class="tab-content">
            <div class="card">
                <h2 class="card-title"><span class="material-symbols-outlined">terminal</span> Console</h2>
                <div id="terminalBody" class="console">
                    <!-- Logs -->
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('app-logo-img').src = document.querySelector('link[rel="icon"]').href;

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-theme');
                const icon = document.getElementById('themeIcon');
                if (icon) icon.innerText = 'dark_mode';
            }
        }
        initTheme();

        function toggleTheme() {
            const isLight = document.documentElement.classList.toggle('light-theme');
            document.getElementById('themeIcon').innerText = isLight ? 'dark_mode' : 'light_mode';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            
            Chart.defaults.color = isLight ? '#44474e' : '#c4c6d0';
            Object.values(chartInstances).forEach(c => {
                c.options.scales.y.ticks.color = Chart.defaults.color;
                c.options.scales.y2.ticks.color = Chart.defaults.color;
                c.options.scales.x.ticks.color = Chart.defaults.color;
                c.update();
            });
        }

        function timeAgo(timestamp) {
            if (!timestamp) return '';
            const seconds = Math.floor(Date.now() / 1000) - timestamp;
            if (seconds < 60) return seconds + ' 秒前';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + ' 分前';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + ' 時前';
            return Math.floor(hours / 24) + ' 天前';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.seg-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        let chartInstances = {};
        window.previousScores = window.previousScores || {};

        async function fetchGroups() {
            try {
                const res = await fetch('/api/groups');
                const data = await res.json();
                const grid = document.getElementById('groupsGrid');
                if (!data || data.length === 0) return;

                let html = '';
                data.forEach(g => {
                    let options = g.all_nodes.map(n => '<option value="' + n + '" ' + (n === g.now ? 'selected' : '') + '>' + n + '</option>').join('');
                    let lockBtnClass = g.locked ? 'btn icon-btn' : 'btn secondary icon-btn';
                    let lockIcon = g.locked ? 'lock' : 'lock_open';
                    let lockTitle = g.locked ? '點擊解鎖 (恢復自動切換)' : '點擊鎖定 (停止自動切換)';
                    
                    html += '<div class="group-card">' +
                            '<div class="group-header" style="display:flex; justify-content:space-between; align-items:center;">' + 
                                '<span>' + g.name + '</span>' +
                                '<button class="' + lockBtnClass + '" onclick="toggleGroupLock(\'' + g.name + '\', ' + !g.locked + ')" title="' + lockTitle + '" style="width:32px; height:32px;"><span class="material-symbols-outlined" style="font-size:16px">' + lockIcon + '</span></button>' +
                            '</div>' +
                            '<div class="group-now">' + (g.now || '未選擇') + '</div>' +
                            (g.provider ? '<div class="badge primary" style="align-self: flex-start;"><span class="material-symbols-outlined" style="font-size:14px">corporate_fare</span> ' + g.provider + '</div>' : '') +
                            '<div style="color: var(--md-sys-color-on-surface-variant); font-size:14px; margin-bottom:8px;">運行中 &bull; 共 ' + g.all_count + ' 個節點</div>' +
                            '<div style="display: flex; gap: 8px;">' +
                                '<select id="select-' + g.name + '" style="flex:1; background: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface); border: 1px solid var(--md-sys-color-outline); border-radius: 8px; padding: 8px;">' + options + '</select>' +
                                '<button onclick="manualSwitch(\'' + g.name + '\')" class="btn" style="padding: 8px 16px;">切換</button>' +
                            '</div>' +
                        '</div>';
                });
                grid.innerHTML = html;
            } catch(err) {}
        }

        async function manualSwitch(groupName) {
            const select = document.getElementById('select-' + groupName);
            if (!select) return;
            await fetch('/api/switch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({group: groupName, node: select.value})
            });
            fetchGroups();
        }

        async function toggleGroupLock(groupName, locked) {
            await fetch('/api/groups/lock', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({group: groupName, locked: locked})
            });
            fetchGroups();
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                const tbody = document.getElementById('tbody');
                
                if (!data || data.length === 0) return;
                if (tbody.children.length === 1 && tbody.children[0].textContent.includes('Init')) tbody.innerHTML = '';

                window.nodeList = data;
                const oldPositions = new Map();
                Array.from(tbody.children).forEach(tr => {
                    if (tr.classList.contains('node-row')) oldPositions.set(tr.id, tr.getBoundingClientRect().top);
                });

                data.forEach((node, index) => {
                    const safeId = btoa(encodeURIComponent(node.Name)).replace(/=/g, '');
                    const rowId = 'row-' + safeId;
                    
                    let tr = document.getElementById(rowId);
                    let isNewRow = false;
                    if (!tr) {
                        tr = document.createElement('tr');
                        tr.id = rowId;
                        tr.className = 'node-row';
                        tr.onclick = () => toggleChart(node.Name, safeId, index);
                        isNewRow = true;
                    }
                    
                    let scoreHtml = '<span class="score-box">' + node.Score + '</span>';
                    if (!isNewRow && window.previousScores[node.Name] !== undefined) {
                        const oldScore = window.previousScores[node.Name];
                        if (node.Score > oldScore) scoreHtml = '<span class="score-box flash-green">' + node.Score + '</span>';
                        else if (node.Score < oldScore) scoreHtml = '<span class="score-box flash-red">' + node.Score + '</span>';
                    }
                    window.previousScores[node.Name] = node.Score;
                    
                    const scRate = (node.SuccessRate * 100).toFixed(1) + '%';
                    let successStyle = node.SuccessRate > 0.9 ? 'color: var(--md-sys-color-success)' : (node.SuccessRate > 0.5 ? 'color: var(--md-sys-color-warning)' : 'color: var(--md-sys-color-error)');
                    
                    let webSuccessStr = '-';
                    let webLoadStr = '-';
                    if (node.BrowserTested) {
                        webSuccessStr = '<span style="' + (node.BrowserSuccessRate>=0.9 ? 'color:var(--md-sys-color-success)' : (node.BrowserSuccessRate>=0.5 ? 'color:var(--md-sys-color-warning)' : 'color:var(--md-sys-color-error)')) + ';">' + (node.BrowserSuccessRate * 100).toFixed(0) + '%</span>';
                        webLoadStr = node.AvgBrowserLoadTime > 0 ? (node.AvgBrowserLoadTime / 1000).toFixed(2) + ' s' : '<span style="color:var(--md-sys-color-error)">Timeout</span>';
                    }

                    let providerTag = node.provider ? '<div class="badge primary" style="margin-top:4px; font-size: 10px;"><span class="material-symbols-outlined" style="font-size:12px">corporate_fare</span> ' + node.provider + '</div>' : '';
                    let groupBadges = '';
                    if (node.highest_in_groups && node.highest_in_groups.length > 0) {
                        groupBadges = node.highest_in_groups.map(g => '<div class="badge success" style="margin-top:4px; margin-left:4px; font-size: 10px;"><span class="material-symbols-outlined" style="font-size:12px">workspace_premium</span> ' + escapeHtml(g) + '</div>').join('');
                    }
                    if (node.backoff_remaining && node.backoff_remaining > 0) {
                        groupBadges += '<div class="badge error" style="margin-top:4px; margin-left:4px; font-size: 10px;"><span class="material-symbols-outlined" style="font-size:12px">timer_off</span> 退避中 (' + node.backoff_remaining + ' 輪)</div>';
                    }

                    let lastTestTime = Math.max(node.LastBandwidthTime || 0, node.LastBrowserTime || 0);
                    let lastTestStr = lastTestTime ? timeAgo(lastTestTime) : '-';

                    let interviewStr = '-';
                    if (node.last_interview_time > 0) {
                        const remainMin = node.cooldown_minutes - (Math.floor(Date.now() / 60000) - Math.floor(node.last_interview_time / 60));
                        interviewStr = remainMin <= 0 ? timeAgo(node.last_interview_time) + ' <span style="color:var(--md-sys-color-success)">(OK)</span>' : timeAgo(node.last_interview_time) + ' <span style="color:var(--md-sys-color-warning)">(' + remainMin + 'm)</span>';
                    }

                    tr.innerHTML = '<td>#' + (index + 1) + '</td>' +
                        '<td style="font-weight:500;">' + escapeHtml(node.Name) + '<br>' + providerTag + groupBadges + '</td>' +
                        '<td>' + scoreHtml + '</td>' +
                        '<td style="' + successStyle + ';">' + scRate + '</td>' +
                        '<td>' + webSuccessStr + '</td>' +
                        '<td>' + webLoadStr + '</td>' +
                        '<td style="color: var(--md-sys-color-on-surface-variant);">' + lastTestStr + '</td>' +
                        '<td style="color: var(--md-sys-color-on-surface-variant);">' + interviewStr + '</td>';

                    tbody.appendChild(tr);
                    const chartRow = document.getElementById('chart-row-' + safeId);
                    if (chartRow) tbody.appendChild(chartRow);
                });

                Array.from(tbody.children).forEach(tr => {
                    if (tr.classList.contains('node-row') && oldPositions.has(tr.id)) {
                        const deltaY = oldPositions.get(tr.id) - tr.getBoundingClientRect().top;
                        if (deltaY !== 0) {
                            tr.style.transform = 'translateY(' + deltaY + 'px)';
                            tr.style.transition = 'none';
                            tr.offsetHeight;
                            requestAnimationFrame(() => {
                                tr.style.transform = '';
                                tr.style.transition = 'transform 0.5s cubic-bezier(0.2, 0, 0, 1)';
                            });
                        }
                    }
                });
            } catch (err) {}
        }

        async function toggleChart(nodeName, safeId, index) {
            const tr = document.getElementById('row-' + safeId);
            let chartRow = document.getElementById('chart-row-' + safeId);
            
            if (chartRow) {
                chartRow.remove();
                tr.classList.remove('expanded-row');
                if (chartInstances[safeId]) { chartInstances[safeId].destroy(); delete chartInstances[safeId]; }
                return;
            }

            document.querySelectorAll('.chart-row').forEach(el => el.remove());
            document.querySelectorAll('tr').forEach(el => el.classList.remove('expanded-row'));
            Object.values(chartInstances).forEach(c => c.destroy());
            chartInstances = {};

            tr.classList.add('expanded-row');
            chartRow = document.createElement('tr');
            chartRow.id = 'chart-row-' + safeId;
            chartRow.className = 'chart-row expanded-row';
            
            const node = window.nodeList[index];
            const speedStr = node.AvgBandwidth > 0 ? (node.AvgBandwidth > 1000 ? (node.AvgBandwidth/1024).toFixed(2) + ' MB/s' : node.AvgBandwidth.toFixed(1) + ' KB/s') : '-';
            let consumedStr = '-';
            if (node.TotalConsumedBytes > 0) {
                const mb = node.TotalConsumedBytes / (1024 * 1024);
                consumedStr = mb >= 1024 ? (mb / 1024).toFixed(2) + ' GB' : mb.toFixed(1) + ' MB';
            }

            let detailsHtml = '<div style="display:flex; gap:16px; padding:16px; margin-bottom:16px; background:var(--md-sys-color-surface-container); border-radius:16px;">' +
                '<div style="flex:1"><div style="font-size:12px; color:var(--md-sys-color-on-surface-variant);">平均延遲</div><div style="font-size:18px;">' + node.AvgDelay.toFixed(0) + ' ms</div></div>' +
                '<div style="flex:1"><div style="font-size:12px; color:var(--md-sys-color-on-surface-variant);">抖動 (Jitter)</div><div style="font-size:18px;">' + node.Jitter + ' ms</div></div>' +
                '<div style="flex:1"><div style="font-size:12px; color:var(--md-sys-color-on-surface-variant);">樣本數</div><div style="font-size:18px;">' + (node.SampleCount || 0) + '</div></div>' +
                '<div style="flex:1"><div style="font-size:12px; color:var(--md-sys-color-on-surface-variant);">平均速度</div><div style="font-size:18px;">' + speedStr + '</div></div>' +
                '<div style="flex:1"><div style="font-size:12px; color:var(--md-sys-color-on-surface-variant);">已用流量</div><div style="font-size:18px;">' + consumedStr + '</div></div>' +
            '</div>';

            chartRow.innerHTML = '<td colspan="8"><div style="padding: 16px;">' + detailsHtml + '<div class="chart-container"><canvas id="canvas-' + safeId + '"></canvas></div></div></td>';
            tr.parentNode.insertBefore(chartRow, tr.nextSibling);

            try {
                const res = await fetch('/api/history?node=' + encodeURIComponent(nodeName));
                const dataRaw = await res.json();
                if (!dataRaw || !dataRaw.ping || dataRaw.ping.length === 0) return;

                const ctx = document.getElementById('canvas-' + safeId).getContext('2d');
                const labels = dataRaw.ping.map(h => {
                    const d = new Date(h.Timestamp * 1000);
                    return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
                });
                const pingData = dataRaw.ping.map(h => h.Delay);
                const browserData = dataRaw.ping.map(p => {
                    const b = dataRaw.browser ? dataRaw.browser.find(b => Math.abs(b.Timestamp - p.Timestamp) < 300) : null;
                    return b ? b.LoadTimeMs : null;
                });

                Chart.defaults.color = document.documentElement.classList.contains('light-theme') ? '#44474e' : '#c4c6d0';
                Chart.defaults.font.family = "'Roboto', sans-serif";

                chartInstances[safeId] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Ping (ms)', data: pingData, borderColor: '#a8c7fa', backgroundColor: 'rgba(168,199,250,0.1)', fill: true, tension: 0.4, yAxisID: 'y' },
                            { label: 'Browser (ms)', data: browserData, borderColor: '#6dd58c', fill: false, tension: 0.1, yAxisID: 'y2' }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { position: 'left' }, y2: { position: 'right', grid: { drawOnChartArea: false } } } }
                });
            } catch (err) {}
        }

        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const btn = document.getElementById('triggerBtn');
                const icon = document.getElementById('triggerIcon');
                const text = document.getElementById('triggerText');
                if (data.is_running) {
                    btn.disabled = true; icon.classList.add('spin'); text.innerText = 'Testing...';
                } else {
                    btn.disabled = false; icon.classList.remove('spin'); text.innerText = 'Run Test';
                }
                const pBtn = document.getElementById('pauseBtn');
                if (data.is_paused) {
                    pBtn.classList.remove('secondary');
                    pBtn.innerHTML = '<span class="material-symbols-outlined">play_arrow</span> Resume Brain';
                } else {
                    pBtn.classList.add('secondary');
                    pBtn.innerHTML = '<span class="material-symbols-outlined">pause</span> Pause Brain';
                }
            } catch (err) {}
        }

        async function triggerTest() {
            document.getElementById('triggerBtn').disabled = true;
            await fetch('/api/trigger', { method: 'POST' });
        }
        async function togglePause() {
            await fetch('/api/pause', { method: 'POST' });
            checkStatus();
        }

        function connectWebSocket() {
            const wsUrl = (window.location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + window.location.host + '/api/ws';
            const ws = new WebSocket(wsUrl);
            ws.onmessage = function(event) {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'refresh') { fetchGroups(); fetchStats(); checkStatus(); }
                    else if (msg.type === 'log') { appendLog(msg.entry); }
                    else if (msg.type === 'log_history') {
                        document.getElementById('terminalBody').innerHTML = '';
                        if (msg.history) msg.history.forEach(e => appendLog(e));
                    }
                } catch(e) {}
            };
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        function appendLog(entry) {
            const term = document.getElementById('terminalBody');
            const div = document.createElement('div');
            let levelClass = 'log-info';
            let badgeText = 'INFO';
            
            if (entry.level === 'success') { levelClass = 'log-success'; badgeText = 'OK'; }
            else if (entry.level === 'warning') { levelClass = 'log-warning'; badgeText = 'WARN'; }
            else if (entry.level === 'error') { levelClass = 'log-error'; badgeText = 'FAIL'; }

            let msgText = entry.message;
            // Clean up emojis from backend
            if (msgText.startsWith('💡 ')) msgText = msgText.substring(3);
            if (msgText.startsWith('✅ ')) msgText = msgText.substring(3);
            if (msgText.startsWith('⚠️ ')) msgText = msgText.substring(3);
            if (msgText.startsWith('❌ ')) msgText = msgText.substring(3);

            div.className = 'log-line ' + levelClass;
            div.innerHTML = '<div class="log-time">[' + entry.time + ']</div>' +
                            '<div class="log-badge">' + badgeText + '</div>' +
                            '<div class="log-msg">' + escapeHtml(msgText) + '</div>';
            
            const isScrolledToBottom = term.scrollHeight - term.clientHeight <= term.scrollTop + 50;
            term.appendChild(div);
            while (term.children.length > 200) term.removeChild(term.firstChild);
            if (isScrolledToBottom) term.scrollTop = term.scrollHeight;
        }

        function escapeHtml(unsafe) {
            return String(unsafe || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        fetchGroups();
        fetchStats();
        checkStatus();
        connectWebSocket();
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
